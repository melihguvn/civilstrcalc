<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>EC2 Headless Runner</title></head>
<body>
<div id="status">Initializing...</div>
<iframe id="frame" src="/pages/slab.html" style="display:none"></iframe>
<script>
const statusEl = document.getElementById('status');
const SERVER = 'http://localhost:8765';

async function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function pollReady(win, name, maxMs) {
  const t0 = Date.now();
  while (Date.now() - t0 < maxMs) {
    try { if (typeof win[name] !== 'undefined') return true; } catch(e) {}
    await wait(100);
  }
  return false;
}

document.getElementById('frame').addEventListener('load', async () => {
  const win = document.getElementById('frame').contentWindow;

  statusEl.textContent = 'Waiting for slab.html...';
  const ready = await pollReady(win, 'calcEC2PunchShear', 10000);
  if (!ready) {
    statusEl.textContent = 'ERROR: calcEC2PunchShear not found';
    await fetch(SERVER + '/results', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify([{id:'LOAD',name:'IframeLoad',status:'ERROR',error:'calcEC2PunchShear not defined',checks:[]}]) });
    return;
  }

  statusEl.textContent = 'Loading EC2 test suite...';
  const sc = win.document.createElement('script');
  sc.src = SERVER + '/tests/punching-ec2-test.js?' + Date.now();
  win.document.head.appendChild(sc);
  const suiteReady = await pollReady(win, 'PUNCH_EC2', 5000);
  if (!suiteReady) {
    statusEl.textContent = 'ERROR: PUNCH_EC2 not on window';
    await fetch(SERVER + '/results', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify([{id:'LOAD',name:'SuiteLoad',status:'ERROR',error:'PUNCH_EC2 not on window',checks:[]}]) });
    return;
  }

  statusEl.textContent = 'Running 13 EC2 tests...';
  let results;
  try {
    results = await win.PUNCH_EC2.run({ download: false });
  } catch(e) {
    statusEl.textContent = 'ERROR: ' + e.message;
    await fetch(SERVER + '/results', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify([{id:'RUN',name:'RunError',status:'ERROR',error:e.message,checks:[]}]) });
    return;
  }

  const passed = results.filter(r => r.status === 'PASS').length;
  statusEl.textContent = `Done: ${passed}/${results.length} passed`;

  const clean = results.map(r => ({
    id: r.id, name: r.name, status: r.status, error: r.error,
    checks: (r.checks || []).map(c => ({
      label: c.label, pass: c.pass, info: c.info,
      expected: typeof c.expected === 'number' ? +c.expected.toFixed(6) : c.expected,
      actual:   typeof c.actual   === 'number' ? +c.actual.toFixed(6)   : c.actual,
      diffPct:  c.diffPct,
    }))
  }));

  await fetch(SERVER + '/results', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(clean),
  });
});
</script>
</body>
</html>
