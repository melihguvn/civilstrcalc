<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Punching Shear — Extended Test Runner</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: system-ui, monospace; font-size: 13px; background: #0f172a; color: #e2e8f0; padding: 0; }
  header { background: #1e293b; padding: 14px 20px; border-bottom: 1px solid #334155;
           display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 15px; font-weight: 700; color: #f1f5f9; }
  header .sub { font-size: 12px; color: #64748b; }
  .btn { padding: 7px 18px; border-radius: 6px; border: none; font-size: 13px;
         font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-run  { background: #7c3aed; color: white; }
  .btn-all  { background: #2563eb; color: white; }
  .btn-dl   { background: #059669; color: white; }
  .btn-clr  { background: #475569; color: white; }
  #frame { display: none; }
  #log { padding: 16px 20px; font-family: monospace; font-size: 12px;
         height: calc(100vh - 60px); overflow-y: auto; }
  .info  { color: #94a3b8; }
  .pass  { color: #4ade80; }
  .fail  { color: #f87171; }
  .warn  { color: #fbbf24; }
  .head  { color: #a78bfa; font-weight: bold; margin-top: 10px; }
  .sep   { color: #334155; }
  table.rt { border-collapse: collapse; width: 100%; margin-top: 12px; }
  table.rt th { background: #1e293b; color: #94a3b8; padding: 5px 10px; text-align: left;
                font-size: 11px; position: sticky; top: 0; }
  table.rt td { padding: 4px 10px; border-bottom: 1px solid #1e293b; font-size: 12px; }
  .tc-pass td { background: #052e16; }
  .tc-fail td { background: #2d0000; }
  .chk-pass td { color: #4ade80; }
  .chk-fail td { color: #f87171; }
  .chk-skip td { color: #475569; }
  .banner { margin: 10px 0; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; }
  .banner-pass { background: #052e16; color: #4ade80; border: 1px solid #16a34a; }
  .banner-fail { background: #2d0000; color: #f87171; border: 1px solid #dc2626; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: #312e81; color: #c4b5fd; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Punching Shear — Extended Test Runner <span class="tag">T16–T35</span></h1>
    <div class="sub">22 scenarios · moments, extremes, codes, multi-run, SVG</div>
  </div>
  <button class="btn btn-run"  onclick="runExtended()">▶ Extended (T16–T35)</button>
  <button class="btn btn-all"  onclick="runBoth()">▶▶ Run All (T01–T35)</button>
  <button class="btn btn-dl"   onclick="dlReport()" id="btn-dl" disabled>⬇ Download Report</button>
  <button class="btn btn-clr"  onclick="clearLog()">✕ Clear</button>
</header>

<iframe id="frame" src="../pages/slab.html" style="width:1px;height:1px;position:fixed;left:-9999px"></iframe>

<div id="log"><span class="info">Click "▶ Extended" to run T16–T35, or "▶▶ Run All" to run all 35 scenarios.</span></div>

<script>
let _results = null;
let _win = null;

function log(msg, cls='') {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
  _results = null;
  document.getElementById('btn-dl').disabled = true;
}

async function loadFrame() {
  if (_win) return _win;
  log('Loading slab.html in iframe...', 'info');
  await new Promise(resolve => {
    const frame = document.getElementById('frame');
    frame.onload = resolve;
    frame.src = '../pages/slab.html?' + Date.now();
  });
  _win = document.getElementById('frame').contentWindow;
  await new Promise(r => setTimeout(r, 800));
  return _win;
}

async function injectScript(win, src) {
  const script = win.document.createElement('script');
  script.src = src + '?' + Date.now();
  win.document.head.appendChild(script);
  await new Promise(r => setTimeout(r, 500));
}

function hookConsole(win) {
  const origLog  = win.console.log;
  const origErr  = win.console.error;
  win.console.log   = (...a) => { origLog(...a);  logFormatted(a.join(' ')); };
  win.console.error = (...a) => { origErr(...a);  log(a.join(' '), 'fail'); };
  return () => { win.console.log = origLog; win.console.error = origErr; };
}

function logFormatted(msg) {
  let cls = 'info';
  if (msg.includes('✅') || msg.includes('PASS') || msg.startsWith('Results:')) cls = 'pass';
  if (msg.includes('❌') || msg.includes('FAIL') || msg.includes('ERROR'))       cls = 'fail';
  if (msg.includes('╔') || msg.includes('══')) cls = 'head';
  if (msg.includes('──')) cls = 'sep';
  log(msg, cls);
}

async function runExtended() {
  clearLog();
  const win = await loadFrame();
  await injectScript(win, '../tests/punching-extended.js');

  if (!win.PUNCH_TEST_EXTENDED) {
    log('ERROR: Extended test suite failed to load.', 'fail');
    return;
  }

  log('Running 22 extended scenarios (T16–T35)...', 'info');
  log('', '');

  const restore = hookConsole(win);
  try {
    _results = await win.PUNCH_TEST_EXTENDED.run({ download: false });
    showTable(_results);
    document.getElementById('btn-dl').disabled = false;
  } catch(e) {
    log('ERROR: ' + e.message, 'fail');
    console.error(e);
  }
  restore();
}

async function runBoth() {
  clearLog();
  const win = await loadFrame();
  await injectScript(win, '../tests/punching-test.js');
  await injectScript(win, '../tests/punching-extended.js');

  if (!win.PUNCH_TEST_SUITE || !win.PUNCH_TEST_EXTENDED) {
    log('ERROR: One or both test suites failed to load.', 'fail');
    return;
  }

  log('Running all 35 scenarios (T01–T35)...', 'info');
  log('', '');

  const restore = hookConsole(win);
  try {
    const r1 = await win.PUNCH_TEST_SUITE.run({ download: false });
    const r2 = await win.PUNCH_TEST_EXTENDED.run({ download: false });
    _results = [...r1, ...r2];
    showTable(_results);
    document.getElementById('btn-dl').disabled = false;
  } catch(e) {
    log('ERROR: ' + e.message, 'fail');
    console.error(e);
  }
  restore();
}

function showTable(results) {
  const passed = results.filter(r => r.status === 'PASS').length;
  const total  = results.length;

  const el = document.getElementById('log');
  const banner = document.createElement('div');
  banner.className = passed === total ? 'banner banner-pass' : 'banner banner-fail';
  banner.textContent = `${passed}/${total} scenarios passed`;
  el.appendChild(banner);

  const table = document.createElement('table');
  table.className = 'rt';
  table.innerHTML = `<tr><th></th><th>Test</th><th>Field</th><th>Status</th><th>Expected</th><th>Actual</th><th>Diff%</th></tr>`;

  results.forEach(r => {
    const tr0 = document.createElement('tr');
    tr0.className = r.status === 'PASS' ? 'tc-pass' : 'tc-fail';
    tr0.innerHTML = `<td>${r.status === 'PASS' ? '✅' : '❌'}</td><td colspan="6"><b>${r.name}</b> — ${r.desc}</td>`;
    table.appendChild(tr0);
    (r.checks || []).forEach(c => {
      const tr = document.createElement('tr');
      tr.className = `chk-${c.status.toLowerCase()}`;
      tr.innerHTML = `<td></td><td></td>
        <td>${c.field}</td>
        <td>${c.status}</td>
        <td>${c.expected !== undefined ? c.expected : ''}</td>
        <td>${c.actual !== undefined ? (typeof c.actual === 'number' ? +c.actual.toFixed(4) : c.actual) : ''}</td>
        <td>${c.diffPct != null ? c.diffPct + '%' : ''}</td>`;
      table.appendChild(tr);
    });
  });
  el.appendChild(table);
}

function dlReport() {
  if (!_results) return;
  // Build combined report
  const win = document.getElementById('frame').contentWindow;
  const suite = win.PUNCH_TEST_EXTENDED || win.PUNCH_TEST_SUITE;
  if (suite) suite.download(_results);
}
</script>
</body>
</html>
