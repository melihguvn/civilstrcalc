<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Punching Shear — Complete Test Runner (T01–T35)</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: system-ui, monospace; font-size: 13px; background: #0f172a; color: #e2e8f0; }
  header { background: #1e293b; padding: 14px 20px; border-bottom: 1px solid #334155;
           display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { font-size: 15px; font-weight: 700; color: #f1f5f9; flex: 1; }
  header .sub { font-size: 11px; color: #64748b; }
  .btn { padding: 7px 18px; border-radius: 6px; border: none; font-size: 13px;
         font-weight: 600; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn-run  { background: #059669; color: white; }
  .btn-dl   { background: #2563eb; color: white; }
  .btn-clr  { background: #475569; color: white; }
  #frame { display:none; }
  #log { padding: 16px 20px; font-family: monospace; font-size: 12px;
         height: calc(100vh - 58px); overflow-y: auto; }
  .info  { color: #94a3b8; }
  .pass  { color: #4ade80; }
  .fail  { color: #f87171; }
  .head  { color: #34d399; font-weight: bold; margin-top: 8px; }
  .sep   { color: #334155; }
  .banner { margin: 12px 0; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 700; }
  .banner-pass { background:#052e16; color:#4ade80; border:1px solid #16a34a; }
  .banner-fail { background:#2d0000; color:#f87171; border:1px solid #dc2626; }
  table.rt { border-collapse:collapse; width:100%; margin-top:10px; }
  table.rt th { background:#1e293b; color:#94a3b8; padding:5px 10px; text-align:left;
                font-size:11px; position:sticky; top:0; z-index:1; }
  table.rt td { padding:4px 10px; border-bottom:1px solid #1e293b; font-size:12px; }
  .tc-pass td { background:#052e16; }
  .tc-fail td { background:#2d0000; }
  .tc-error td { background:#2d1a00; }
  .chk-pass td { color:#4ade80; }
  .chk-fail td { color:#f87171; }
  .chk-info td { color:#64748b; font-style:italic; }
  .section-hdr td { background:#1e3a5f!important; color:#93c5fd!important; font-weight:700; font-size:11px; letter-spacing:.05em; }
</style>
</head>
<body>
<header>
  <div>
    <div class="sub">Complete Automated Test Suite</div>
    <h1>Punching Shear — T01–T35 &nbsp;<span style="color:#64748b;font-weight:400;font-size:13px">(35 scenarios)</span></h1>
  </div>
  <button class="btn btn-run" onclick="runTests()">▶ Run All 35 Tests</button>
  <button class="btn btn-dl"  onclick="dlReport()" id="btn-dl" disabled>⬇ Download Report</button>
  <button class="btn btn-clr" onclick="clearLog()">✕ Clear</button>
</header>

<iframe id="frame" src="../pages/slab.html" style="width:1px;height:1px;position:fixed;left:-9999px"></iframe>
<div id="log"><span class="info">Click "▶ Run All 35 Tests" to begin.</span></div>

<script>
let _results = null;
let _win = null;

function log(msg, cls='') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
  _results = null;
  document.getElementById('btn-dl').disabled = true;
}

function logFmt(msg) {
  let cls = 'info';
  if (msg.includes('✅') || msg.includes('PASS') || msg.startsWith('Results:')) cls = 'pass';
  if (msg.includes('❌') || msg.includes('💥') || msg.includes('FAIL') || msg.includes('ERROR')) cls = 'fail';
  if (msg.includes('╔') || msg.includes('══')) cls = 'head';
  if (msg.includes('──')) cls = 'sep';
  log(msg, cls);
}

async function runTests() {
  clearLog();
  log('Loading slab.html…', 'info');

  await new Promise(resolve => {
    const f = document.getElementById('frame');
    f.onload = resolve;
    f.src = '../pages/slab.html?' + Date.now();
  });
  _win = document.getElementById('frame').contentWindow;
  await new Promise(r => setTimeout(r, 800));

  const sc = _win.document.createElement('script');
  sc.src = '../tests/punching-complete.js?' + Date.now();
  _win.document.head.appendChild(sc);
  await new Promise(r => setTimeout(r, 600));

  if (!_win.PUNCH_COMPLETE) {
    log('ERROR: punching-complete.js failed to load.', 'fail');
    return;
  }

  const orig  = _win.console.log;
  const origE = _win.console.error;
  _win.console.log   = (...a) => { orig(...a);  logFmt(a.join(' ')); };
  _win.console.error = (...a) => { origE(...a); log(a.join(' '), 'fail'); };

  try {
    _results = await _win.PUNCH_COMPLETE.run({ download: false });
    renderTable(_results);
    document.getElementById('btn-dl').disabled = false;
  } catch(e) {
    log('ERROR: ' + e.message, 'fail');
    console.error(e);
  }

  _win.console.log   = orig;
  _win.console.error = origE;
}

function renderTable(results) {
  const passed = results.filter(r => r.status === 'PASS').length;
  const total  = results.length;
  const el = document.getElementById('log');

  const banner = document.createElement('div');
  banner.className = passed === total ? 'banner banner-pass' : 'banner banner-fail';
  banner.textContent = `${passed}/${total} scenarios passed`;
  el.appendChild(banner);

  const tbl = document.createElement('table');
  tbl.className = 'rt';
  tbl.innerHTML = `<tr><th style="width:22px"></th><th style="width:44px">ID</th>
    <th>Test / Description</th><th>Field / Assertion</th>
    <th style="width:100px">Expected</th><th style="width:100px">Actual</th>
    <th style="width:54px">Diff%</th></tr>`;

  // Section headers
  const SECTIONS = [
    { label:'Basic Functionality — T01–T15', fromId:'T01', toNum:15, color:'#1e3a5f' },
    { label:'Advanced & Edge Cases — T16–T35', fromId:'T16', toNum:99, color:'#2d1854' },
  ];

  let sectionIdx = 0;
  results.forEach(r => {
    const num = parseInt(r.id.replace('T',''));
    if (sectionIdx < SECTIONS.length - 1 && num >= parseInt(SECTIONS[sectionIdx+1].fromId.replace('T',''))) {
      sectionIdx++;
      const sh = document.createElement('tr');
      sh.className = 'section-hdr';
      sh.innerHTML = `<td colspan="7">${SECTIONS[sectionIdx].label}</td>`;
      tbl.appendChild(sh);
    }

    const icon = r.status === 'PASS' ? '✅' : r.status === 'ERROR' ? '💥' : '❌';
    const tc = document.createElement('tr');
    tc.className = r.status === 'PASS' ? 'tc-pass' : r.status === 'ERROR' ? 'tc-error' : 'tc-fail';
    tc.innerHTML = `<td>${icon}</td><td><b>${r.id}</b></td>
      <td colspan="5"><b>${r.name}</b> — ${r.desc}</td>`;
    tbl.appendChild(tc);

    (r.checks || []).forEach(c => {
      const cls = c.info ? 'chk-info' : c.pass ? 'chk-pass' : 'chk-fail';
      const sym = c.info ? 'ℹ' : c.pass ? '✓' : '✗';
      const act = c.actual !== undefined
        ? (typeof c.actual === 'number' ? +c.actual.toFixed(4) : c.actual)
        : '';
      const exp = c.expected !== null && c.expected !== undefined ? c.expected : '';
      const tr = document.createElement('tr');
      tr.className = cls;
      tr.innerHTML = `<td></td><td>${sym}</td><td></td>
        <td>${c.label ?? ''}</td>
        <td>${exp}</td>
        <td>${act}</td>
        <td>${c.diffPct != null ? c.diffPct + '%' : ''}</td>`;
      tbl.appendChild(tr);
    });
  });

  el.appendChild(tbl);
}

function dlReport() {
  if (!_results || !_win?.PUNCH_COMPLETE) return;
  _win.PUNCH_COMPLETE.download(_results);
}
</script>
</body>
</html>
