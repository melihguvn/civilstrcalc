<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Punching Shear — Test Runner</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: system-ui, monospace; font-size: 13px; background: #0f172a; color: #e2e8f0; padding: 0; }
  header { background: #1e293b; padding: 14px 20px; border-bottom: 1px solid #334155;
           display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 15px; font-weight: 700; color: #f1f5f9; }
  header .sub { font-size: 12px; color: #64748b; }
  .btn { padding: 7px 18px; border-radius: 6px; border: none; font-size: 13px;
         font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-run  { background: #2563eb; color: white; }
  .btn-dl   { background: #059669; color: white; }
  .btn-clr  { background: #475569; color: white; }
  #frame { display: none; }
  #log { padding: 16px 20px; font-family: monospace; font-size: 12px;
         height: calc(100vh - 56px); overflow-y: auto; }
  .info  { color: #94a3b8; }
  .pass  { color: #4ade80; }
  .fail  { color: #f87171; }
  .warn  { color: #fbbf24; }
  .head  { color: #60a5fa; font-weight: bold; margin-top: 10px; }
  .sep   { color: #334155; }
  .summary-pass { color: #4ade80; font-size: 14px; font-weight: bold; }
  .summary-fail { color: #f87171; font-size: 14px; font-weight: bold; }
  table.rt { border-collapse: collapse; width: 100%; margin-top: 12px; }
  table.rt th { background: #1e293b; color: #94a3b8; padding: 5px 10px; text-align: left;
                font-size: 11px; position: sticky; top: 0; }
  table.rt td { padding: 4px 10px; border-bottom: 1px solid #1e293b; font-size: 12px; }
  .tc-pass td { background: #052e16; }
  .tc-fail td { background: #2d0000; }
  .chk-pass td { color: #4ade80; }
  .chk-fail td { color: #f87171; }
  .chk-skip td { color: #475569; }
  .banner { margin: 10px 0; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; }
  .banner-pass { background: #052e16; color: #4ade80; border: 1px solid #16a34a; }
  .banner-fail { background: #2d0000; color: #f87171; border: 1px solid #dc2626; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Punching Shear — Test Runner</h1>
    <div class="sub">15 critical scenarios · ACI 318-25</div>
  </div>
  <button class="btn btn-run"  onclick="runTests()">▶ Run Tests</button>
  <button class="btn btn-dl"   onclick="dlReport()" id="btn-dl" disabled>⬇ Download Report</button>
  <button class="btn btn-clr"  onclick="clearLog()">✕ Clear</button>
</header>

<!-- Hidden iframe loads slab.html so we can call its functions -->
<iframe id="frame" src="../pages/slab.html" style="width:1px;height:1px;position:fixed;left:-9999px"></iframe>

<div id="log"><span class="info">Click "Run Tests" to begin. The slab calculator will be loaded in an iframe and tested programmatically.</span></div>

<script>
let _results = null;
let _win = null;

function log(msg, cls='') {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
  _results = null;
  document.getElementById('btn-dl').disabled = true;
}

async function runTests() {
  clearLog();
  log('Loading slab.html in iframe...', 'info');

  await new Promise(resolve => {
    const frame = document.getElementById('frame');
    frame.onload = resolve;
    // Reload to get fresh state
    frame.src = '../pages/slab.html?' + Date.now();
    document.getElementById('frame').style.display = 'block';
  });

  _win = document.getElementById('frame').contentWindow;
  await new Promise(r => setTimeout(r, 800)); // wait for page scripts to init

  // Inject test suite into iframe window
  const script = _win.document.createElement('script');
  script.src = '../tests/punching-test.js?' + Date.now();
  _win.document.head.appendChild(script);
  await new Promise(r => setTimeout(r, 500));

  if (!_win.PUNCH_TEST_SUITE) {
    log('ERROR: Test suite failed to load into iframe.', 'fail');
    return;
  }

  log('Running 15 test cases...', 'info');
  log('', '');

  // Capture console output from iframe
  const origLog  = _win.console.log;
  const origErr  = _win.console.error;
  _win.console.log   = (...a) => { origLog(...a); logFormatted(a.join(' ')); };
  _win.console.error = (...a) => { origErr(...a); log(a.join(' '), 'fail'); };

  try {
    _results = await _win.PUNCH_TEST_SUITE.run({ download: false });
    showTable(_results);
    document.getElementById('btn-dl').disabled = false;
  } catch(e) {
    log('ERROR: ' + e.message, 'fail');
    console.error(e);
  }

  // Restore
  _win.console.log   = origLog;
  _win.console.error = origErr;
}

function logFormatted(msg) {
  let cls = 'info';
  if (msg.includes('✅') || msg.includes('PASS') || msg.startsWith('Results:')) cls = 'pass';
  if (msg.includes('❌') || msg.includes('FAIL') || msg.includes('ERROR'))       cls = 'fail';
  if (msg.includes('╔') || msg.includes('══')) cls = 'head';
  if (msg.includes('──')) cls = 'sep';
  log(msg, cls);
}

function showTable(results) {
  const passed = results.filter(r=>r.status==='PASS').length;
  const total  = results.length;

  const el = document.getElementById('log');
  const banner = document.createElement('div');
  banner.className = passed===total ? 'banner banner-pass' : 'banner banner-fail';
  banner.textContent = `${passed}/${total} scenarios passed`;
  el.appendChild(banner);

  const table = document.createElement('table');
  table.className = 'rt';
  table.innerHTML = `<tr><th></th><th>Test</th><th>Field</th><th>Status</th><th>Expected</th><th>Actual</th><th>Diff%</th></tr>`;

  results.forEach(r => {
    const tr0 = document.createElement('tr');
    tr0.className = r.status==='PASS' ? 'tc-pass' : 'tc-fail';
    tr0.innerHTML = `<td>${r.status==='PASS'?'✅':'❌'}</td><td colspan="6"><b>${r.name}</b> — ${r.desc}</td>`;
    table.appendChild(tr0);
    (r.checks||[]).forEach(c => {
      const tr = document.createElement('tr');
      tr.className = `chk-${c.status.toLowerCase()}`;
      tr.innerHTML = `<td></td><td></td>
        <td>${c.field}</td>
        <td>${c.status}</td>
        <td>${c.expected!==undefined?c.expected:''}</td>
        <td>${c.actual!==undefined?(typeof c.actual==='number'?+c.actual.toFixed(4):c.actual):''}</td>
        <td>${c.diffPct!=null?c.diffPct+'%':''}</td>`;
      table.appendChild(tr);
    });
  });
  el.appendChild(table);
}

function dlReport() {
  if (!_results || !_win?.PUNCH_TEST_SUITE) return;
  _win.PUNCH_TEST_SUITE.download(_results);
}
</script>
</body>
</html>
